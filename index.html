<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Practice Analytics | Personal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f8;
            font-family: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
            padding: 28px 24px;
            color: #0a2a38;
        }

        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .metrics-section {
            background: linear-gradient(135deg, #ffffff 0%, #fafdff 100%);
            border-radius: 32px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #dee9f0;
            overflow-x: hidden;
            min-height: auto;
        }

        .metrics-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1c617f;
            margin-bottom: 1rem;
        }

        .kpi-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: space-between;
        }

        .kpi-card {
            background: white;
            flex: 1;
            min-width: 140px;
            border-radius: 28px;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e2edf5;
            transition: transform 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
        }

        .kpi-number {
            font-size: 2.4rem;
            font-weight: 800;
            color: #1c617f;
            line-height: 1;
        }

        .kpi-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #5a7e99;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* 3 charts row layout */
        .charts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 2rem;
            width: 100%;
        }

        .chart-card {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 24px;
            padding: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e2edf5;
            transition: all 0.2s;
        }

        .chart-card h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #1c617f;
            margin-bottom: 0.75rem;
            text-align: center;
            letter-spacing: -0.2px;
        }

        .chart-card canvas {
            width: 100%;
            height: auto;
            max-height: 300px;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 28px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fbfe;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            border: 1px solid #cddfe8;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #2c5f7a;
        }

        select {
            background: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            color: #0a2a38;
        }

        .main-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 0;
            border-bottom: 2px solid #e2ecf3;
            padding-bottom: 0;
        }
        .main-tab-btn {
            background: transparent;
            border: none;
            padding: 0.8rem 1.8rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            color: #5a7e99;
            transition: all 0.2s;
        }
        .main-tab-btn.active {
            background: white;
            color: #1c617f;
            border-bottom: 3px solid #2c7da0;
        }
        
        .main-tab-pane {
            display: none;
            background: transparent;
            overflow-x: hidden;
            width: 100%;
        }
        
        .main-tab-pane.active {
            display: block;
        }
        
        #metricsPane {
            width: 100%;
            max-width: 100%;
        }
        
        #metricsPane.active {
            display: block;
        }

        /* Table pane styles */
        #tablePane.active {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 190px);
            min-height: 400px;
        }

        .table-view {
            overflow-x: auto;
            overflow-y: auto;
            background: white;
            border-radius: 24px;
            padding: 0;
        }
        
        #tablePane.active .table-view {
            flex: 1;
            min-height: 0;
        }

        .table-actions {
            margin-bottom: 1rem;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        #tablePane.active .table-actions {
            flex-shrink: 0;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            min-width: 1000px;
        }
            
        .data-table th, .data-table td {
            border-bottom: 1px solid #e9eff5;
            padding: 10px 8px;
            text-align: left;
            vertical-align: top;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .data-table th {
            background: #f4f9fe;
            position: sticky;
            top: 0;
            font-weight: 700;
        }

        .paste-area textarea {
            width: 100%;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            padding: 1rem;
            border: 2px solid #e2ecf3;
            border-radius: 20px;
            resize: vertical;
            background: #fefefe;
        }
        
        #pastePane.active .paste-area textarea {
            height: calc(100vh - 190px);
            min-height: 400px;
        }
        
        .paste-actions {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-end; 
            gap: 12px; 
        }
        
        .btn-primary {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #1f617f;
        }
        .btn-secondary {
            background: #eef2f5;
            color: #2c5f7a;
            border: 1px solid #cddfe8;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            cursor: pointer;
        }
        .btn-accent {
            background: #f0f4f9;
            color: #1c617f;
            border: 1px solid #cbdde6;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .date-group {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border-left: 6px solid #2c7da0;
        }
        .date-group-header {
            padding: 1.2rem 1.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            transition: background 0.2s;
            border-bottom: 1px solid #a0a8b4;
        }
        .date-group-header:hover {
            background: #e6edf4;
        }
        .group-toggle {
            font-size: 1.3rem;
            transition: transform 0.2s;
        }
        .cards-group {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .cards-group.collapsed {
            display: none;
        }
		
        .query-item {
            border-bottom: 1px solid #a0a8b4;
            background: #fefefe;
            transition: 0.1s;
        }
        .query-item:last-child {
            border-bottom: none;
        }
        .query-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            cursor: pointer;
            background: white;
            transition: background 0.2s;
        }
        .query-header:hover {
            background: #e6edf4;
        }
        .query-info {
            flex: 1;
        }
        .query-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.7rem;
            align-items: center;
        }
        .meta-chip {
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-weight: 600;
        }
        .topic-chip { background: #e1ecf4; color: #1f5e7e; }
        .difficulty-chip { background: #f5e6d3; color: #b4652c; }
        .result-correct { background: #dcfce7; color: #15803d; }
        .result-wrong { background: #ffe8e6; color: #b91c1c; }
        .mistake-chip { background: #fff3e0; color: #c97e00; }
        .attempt-chip { background: #e8f0fe; color: #2c5f7a; }
        .question-text {
            font-weight: 700;
            font-size: 0.9rem;
            color: #0c3e55;
        }
        .query-toggle-icon {
            font-size: 1.2rem;
            color: #6f9fbb;
        }
        .query-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #e4e9ef;
        }
        .query-details.open {
            max-height: 500px;
            transition: max-height 0.4s ease-in;
        }
        .query-block {
            padding: 1rem 1.5rem;
            background: white;
        }
        .query-block:last-child {
            border-bottom: none;
        }
        .query-label {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #1f4e66;
        }
        .query-content {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            background: #f4f7fb;
            padding: 0.8rem;
            border-radius: 14px;
            border: 1px solid #cbd8e4;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .user-backtick-highlight-red {
            background-color: #ffe0e0;
            color: #b91c1c;
            font-weight: 700;
            border-radius: 6px;
            padding: 0 4px;
            font-family: monospace;
            display: inline-block;
        }
		.user-backtick-highlight-green {
    		background-color: #d4f5e2;
    		color: #0a6e3a;
    		font-weight: 700;
    		border-radius: 6px;
    		padding: 0 4px;
    		font-family: monospace;
    		display: inline-block;
		}
        .correct-backtick-highlight {
            background-color: #d4f5e2;
            color: #0a6e3a;
            font-weight: 700;
            border-radius: 6px;
            padding: 0 4px;
            font-family: monospace;
            display: inline-block;
        }
        .filter-bar.hidden-filter {
            display: none;
        }
        
        /* Hide specified buttons */
        #importPasteBtn,
        #appendPasteBtn,
        #toggleBacktickBtn,
        #copyTableBtn,
        #refreshCardsFromTable {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            .metrics-section {
                padding: 1rem;
            }
            .charts-row {
                flex-direction: column;
            }
            .chart-card canvas {
                max-height: 250px;
            }
            #pastePane.active .paste-area textarea {
                height: calc(100vh - 250px);
                min-height: 300px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="dashboard">

    <div class="header-row">
        <h1>📊 SQL Practice Analytics</h1>
        <div class="main-tabs">
            <button class="main-tab-btn active" data-main-tab="dashboard">🏃‍♂️ Practice Logs</button>
            <button class="main-tab-btn" data-main-tab="metrics">📊 Dashboard</button>
            <button class="main-tab-btn" data-main-tab="paste">📋 Paste Records</button>
            <button class="main-tab-btn" data-main-tab="table">📖 View Records</button>
        </div>
    </div>

    <div class="filter-bar" id="globalFilterBar">
        <div class="filter-group"><label>📂 Topic</label><select id="topicFilter"><option value="all">All</option></select></div>
        <div class="filter-group"><label>⚡ Difficulty</label><select id="difficultyFilter"><option value="all">All</option><option value="Easy">Easy</option><option value="Moderate">Medium</option></select></div>
        <div class="filter-group"><label>📅 Date</label><select id="dateOrder"><option value="desc" selected>Newest</option><option value="asc">Oldest</option></select></div>
        <div class="filter-group"><label>🎯 Result</label><select id="resultFilter"><option value="all">All</option><option value="correct">Correct</option><option value="wrong">Incorrect</option></select></div>
        <div class="filter-group"><label>📌 Attempt</label><select id="attemptSort"><option value="all">All</option><option value="attempted">Attempted</option><option value="skipped">Skipped</option></select></div>
    </div>

    <div id="dashboardPane" class="main-tab-pane active">
        <div class="cards-container" id="cardsContainer"></div>
    </div>

    <div id="metricsPane" class="main-tab-pane">
        <div class="metrics-section">
            <div class="metrics-header">
                <h2>📊 Performance Overview</h2>
            </div>
            <div class="kpi-grid" id="kpiContainer"></div>
            
            <!-- THREE CHARTS IN A ROW: existing mistake line chart + two new ones -->
            <div class="charts-row">
                <div class="chart-card">
                    <h3>📈 Mistake Frequency Trend</h3>
                    <canvas id="mistakeChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>📅 Accuracy Trend (Daily)</h3>
                    <canvas id="accuracyTrendChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>🏷️ Topic-wise Accuracy</h3>
                    <canvas id="topicAccuracyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="pastePane" class="main-tab-pane">
        <div class="paste-area">
<!-- Placeholder: 'Paste records (tab-separated, NO header line). Each line must have 9 columns:
Date	Question	Topic	Difficulty	User Query	Correct Query	Mistake Type	Correct	Attempt
06-04-2026	Find product names	Filtering	Easy	SELECT `product_id` FROM inventory;	SELECT `product_name` FROM inventory;	Wrong Column Selection	0	1
-->
            <textarea id="pasteData" rows="10"></textarea>
			
			<div class="paste-actions">
                <button class="btn-primary" id="importPasteBtn">🚀 Import & Replace Records</button>
                <button class="btn-primary" id="appendPasteBtn">➕ Append Records</button>
            </div>
		
		</div>
    </div>

    <div id="tablePane" class="main-tab-pane">
		
        <div class="table-actions">
            
			<button class="btn-primary" id="toggleBacktickBtn">🎨 Show Backticks</button>
            <button class="btn-primary" id="copyTableBtn">📋 Copy Table to Clipboard</button>
            <button class="btn-primary" id="refreshCardsFromTable">🔄 Refresh Cards from Table</button>
        </div>
        <div class="table-view">
            <table class="data-table" id="sourceTable">
                <thead id="tableHeader"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let practiceRecords = [];
    let backtickVisibleInTable = false;

    // Load data from TSV file
    async function loadDataFromTSV() {
        try {
            const response = await fetch('./records.tsv');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const tsvText = await response.text();
            
            // Parse TSV - no header row, exactly 9 columns
            const lines = tsvText.trim().split(/\r?\n/);
            const loadedRecords = [];
            
            for (let i = 0; i < lines.length; i++) {
                const cols = lines[i].split('\t');
                if (cols.length >= 9) {  // Safety check for invalid rows
                    loadedRecords.push({
                        Date: cols[0].trim(),
                        Question: cols[1].trim(),
                        Topic: cols[2].trim(),
                        Difficulty: cols[3].trim(),
                        UserQuery: cols[4].trim(),
                        CorrectQuery: cols[5].trim(),
                        MistakeType: cols[6].trim(),
                        Correct: parseInt(cols[7].trim(), 10),
                        Attempt: parseInt(cols[8].trim(), 10)
                    });
                }
            }
            
            if (loadedRecords.length === 0) {
                throw new Error('No valid records found in TSV');
            }
            
            practiceRecords = loadedRecords;
            return true;
        } catch (error) {
            console.error('Failed to load records.tsv:', error);
            // Show error message to user
            document.getElementById('cardsContainer').innerHTML = '<div style="padding: 2rem; text-align: center; color: #b91c1c;">❌ Failed to load records.tsv. Please check that the file exists in the same directory.</div>';
            return false;
        }
    }

    // Initialize app after data loads
    async function initApp() {
        const loaded = await loadDataFromTSV();
        if (loaded) {
            renderDataTable();
            populateFilters();
            applyFiltersAndSort();
            toggleFilterBarVisibility('dashboard');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function isFullyWrappedInBackticks(sqlText) {
        if (!sqlText) return false;
        const trimmed = sqlText.trim();
        return /^`[^`]+`$/.test(trimmed);
    }

    function applyHiddenBacktickHighlighting(sqlText, type) {
        if (!sqlText) return '';
        let escaped = escapeHtml(sqlText);
        if (type === 'correct') {
            const highlighted = escaped.replace(/`([^`]+)`/g, (match, content) => {
                return `<span class="correct-backtick-highlight">${content}</span>`;
            });
            return highlighted;
        } else {
            const isFullyWrapped = isFullyWrappedInBackticks(sqlText);
            if (isFullyWrapped) {
                const content = sqlText.trim().slice(1, -1);
                const escapedContent = escapeHtml(content);
                return `<span class="user-backtick-highlight-green">${escapedContent}</span>`;
            } else {
                const highlighted = escaped.replace(/`([^`]+)`/g, (match, content) => {
                    return `<span style="background-color:#ffe0e0;color:#b91c1c;font-weight:700;">${content}</span>`;
                });
                return highlighted;
            }
        }
    }

    function getTableDisplayText(sqlText, showBackticks) {
        if (!sqlText) return '';
        if (showBackticks) {
            return sqlText;
        } else {
            return sqlText.replace(/`/g, '');
        }
    }

    let currentFilteredData = [];

    // Chart instances
    let mistakeChartInstance = null;
    let accuracyTrendChartInstance = null;
    let topicAccuracyChartInstance = null;

    // Helper: group by date & compute accuracy %
    function computeDailyAccuracy(data) {
        const dateMap = new Map(); // date -> { correct, total }
        for (let rec of data) {
            if (!dateMap.has(rec.Date)) dateMap.set(rec.Date, { correct: 0, total: 0 });
            const entry = dateMap.get(rec.Date);
            entry.total++;
            if (rec.Correct === 1) entry.correct++;
        }
        const sortedDates = Array.from(dateMap.keys()).sort((a,b) => {
            const d1 = new Date(a.split('-').reverse().join('-'));
            const d2 = new Date(b.split('-').reverse().join('-'));
            return d1 - d2;
        });
        const labels = sortedDates;
        const accuracies = sortedDates.map(date => {
            const { correct, total } = dateMap.get(date);
            return total === 0 ? 0 : (correct / total) * 100;
        });
        return { labels, accuracies };
    }

    // Helper: group by topic & compute accuracy %
    function computeTopicAccuracy(data) {
        const topicMap = new Map();
        for (let rec of data) {
            if (!topicMap.has(rec.Topic)) topicMap.set(rec.Topic, { correct: 0, total: 0 });
            const entry = topicMap.get(rec.Topic);
            entry.total++;
            if (rec.Correct === 1) entry.correct++;
        }
        const topics = Array.from(topicMap.keys()).sort();
        const accuracies = topics.map(topic => {
            const { correct, total } = topicMap.get(topic);
            return total === 0 ? 0 : (correct / total) * 100;
        });
        return { topics, accuracies };
    }

    // Render all three charts: mistake (existing logic but keep), accuracy trend, topic horizontal bar
    function renderAllCharts() {
        // 1) Existing mistake chart (line chart on mistake counts)
        const canvasMistake = document.getElementById('mistakeChart');
        if (canvasMistake) {
            const counts = {};
            currentFilteredData.forEach(r => {
                if (r.Correct === 0) {
                    const mistake = r.MistakeType || "Unknown";
                    counts[mistake] = (counts[mistake] || 0) + 1;
                }
            });
            const labels = Object.keys(counts);
            const data = Object.values(counts);
            if (mistakeChartInstance) mistakeChartInstance.destroy();
            mistakeChartInstance = new Chart(canvasMistake, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Mistake Count',
                        data: data,
                        fill: true,
                        tension: 0.4,
                        borderColor: '#E76F51',    // rich warm orange/red
                        backgroundColor: 'rgba(231, 111, 81, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#F4A261',
                        pointBorderColor: '#fff',
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: 'top' }, tooltip: { enabled: true } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        // 2) Accuracy Trend (Line Chart) - Group by Date, ascending order
        const { labels: dateLabels, accuracies } = computeDailyAccuracy(currentFilteredData);
        const accuracyCanvas = document.getElementById('accuracyTrendChart');
        if (accuracyCanvas) {
            if (accuracyTrendChartInstance) accuracyTrendChartInstance.destroy();
            accuracyTrendChartInstance = new Chart(accuracyCanvas, {
                type: 'line',
                data: {
                    labels: dateLabels,
                    datasets: [{
                        label: 'Accuracy %',
                        data: accuracies,
                        fill: true,
                        tension: 0.3,
                        borderColor: '#2A9D8F',    // rich teal
                        backgroundColor: 'rgba(42, 157, 143, 0.15)',
                        borderWidth: 3,
                        pointBackgroundColor: '#E9C46A',
                        pointBorderColor: '#264653',
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointStyle: 'circle'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top', labels: { font: { size: 11 } } },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)}%` } }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: { display: true, text: 'Accuracy (%)', color: '#2c5f7a' },
                            ticks: { callback: (val) => val + '%' }
                        },
                        x: { title: { display: true, text: 'Date', color: '#2c5f7a' } }
                    }
                }
            });
        }

        // 3) Topic-wise Accuracy (Horizontal Bar Chart)
        const { topics, accuracies: topicAccuracies } = computeTopicAccuracy(currentFilteredData);
        const topicCanvas = document.getElementById('topicAccuracyChart');
        if (topicCanvas) {
            if (topicAccuracyChartInstance) topicAccuracyChartInstance.destroy();
            topicAccuracyChartInstance = new Chart(topicCanvas, {
                type: 'bar',
                data: {
                    labels: topics,
                    datasets: [{
                        label: 'Accuracy %',
                        data: topicAccuracies,
                        backgroundColor: '#E9C46A',   // golden rich
                        borderColor: '#F4A261',
                        borderWidth: 1,
                        borderRadius: 6,
                        barPercentage: 0.7,
                        categoryPercentage: 0.9
                    }]
                },
                options: {
                    indexAxis: 'y',   // horizontal bar chart
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)}%` } }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            max: 100,
                            title: { display: true, text: 'Accuracy (%)', color: '#2c5f7a' },
                            ticks: { callback: (val) => val + '%' }
                        },
                        y: { title: { display: true, text: 'Topic', color: '#2c5f7a' } }
                    }
                }
            });
        }
    }

    function applyFiltersAndSort() {
        const topicVal = document.getElementById('topicFilter').value;
        const difficultyVal = document.getElementById('difficultyFilter').value;
        const resultVal = document.getElementById('resultFilter').value;
        const dateOrder = document.getElementById('dateOrder').value;
        const attemptVal = document.getElementById('attemptSort').value;

        let filtered = practiceRecords.filter(rec => {
            if (topicVal !== 'all' && rec.Topic !== topicVal) return false;
            if (difficultyVal !== 'all' && rec.Difficulty !== difficultyVal) return false;
            if (resultVal === 'correct' && rec.Correct !== 1) return false;
            if (resultVal === 'wrong' && rec.Correct !== 0) return false;
            if (attemptVal === 'attempted' && rec.Attempt !== 1) return false;
            if (attemptVal === 'skipped' && rec.Attempt !== 0) return false;
            return true;
        });

        filtered.sort((a, b) => {
            const d1 = new Date(a.Date.split('-').reverse().join('-'));
            const d2 = new Date(b.Date.split('-').reverse().join('-'));
            return dateOrder === 'asc' ? d1 - d2 : d2 - d1;
        });
        currentFilteredData = filtered;
        renderDashboardCards();
        updateKPIs();
        renderAllCharts();  // update all three charts
    }

    function renderDashboardCards() {
        const groups = new Map();
        for (let rec of currentFilteredData) {
            if (!groups.has(rec.Date)) groups.set(rec.Date, []);
            groups.get(rec.Date).push(rec);
        }
        let html = '';
        for (let [date, records] of groups.entries()) {
            const itemsHtml = records.map(rec => {
                const resultClass = rec.Correct === 1 ? 'result-correct' : 'result-wrong';
                const resultText = rec.Correct === 1 ? '✓ CORRECT' : '✗ WRONG';
                let userQueryDisplay = applyHiddenBacktickHighlighting(rec.UserQuery, 'user');
                let correctQueryDisplay = applyHiddenBacktickHighlighting(rec.CorrectQuery, 'correct');
                const attemptText = rec.Attempt === 1 ? 'Attempted' : 'Skipped';
                const mistakeChip = rec.MistakeType !== "None" ? `<span class="meta-chip mistake-chip">🧠 ${escapeHtml(rec.MistakeType)}</span>` : '';
                return `
                    <div class="query-item">
                        <div class="query-header">
                            <div class="query-info">
                                <div class="query-meta">
                                    <span class="meta-chip topic-chip">🏷️ ${escapeHtml(rec.Topic)}</span>
                                    <span class="meta-chip difficulty-chip">⚡ ${escapeHtml(rec.Difficulty)}</span>
                                    <span class="meta-chip ${resultClass}">${resultText}</span>
                                    ${mistakeChip}
                                    <span class="meta-chip attempt-chip">📌 ${attemptText}</span>
                                </div>
                                <div class="question-text">❓ ${escapeHtml(rec.Question)}</div>
                            </div>
                            <div class="query-toggle-icon">↓</div>
                        </div>
                        <div class="query-details">
                            <div class="query-block">
                                <div class="query-label">🔴 USER QUERY</div>
                                <div class="query-content">${userQueryDisplay || '(empty)'}</div>
                            </div>
                            <div class="query-block">
                                <div class="query-label">🟢 CORRECT QUERY</div>
                                <div class="query-content">${correctQueryDisplay || '(empty)'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            html += `
                <div class="date-group">
                    <div class="date-group-header" data-date="${date}">
                        <span>📅 ${date} &nbsp; (${records.length} attempts)</span>
                        <span class="group-toggle">↓</span>
                    </div>
                    <div class="cards-group" data-group="${date}">
                        ${itemsHtml}
                    </div>
                </div>
            `;
        }
        document.getElementById('cardsContainer').innerHTML = html;
        attachGroupToggleEvents();
        attachQueryToggleEvents();
    }

    function attachGroupToggleEvents() {
        document.querySelectorAll('.date-group-header').forEach(header => {
            header.removeEventListener('click', groupToggleHandler);
            header.addEventListener('click', groupToggleHandler);
        });
    }
    function groupToggleHandler(e) {
        const groupDiv = this.parentElement.querySelector('.cards-group');
        const icon = this.querySelector('.group-toggle');
        if (groupDiv.classList.contains('collapsed')) {
            groupDiv.classList.remove('collapsed');
            icon.textContent = '↓';
        } else {
            groupDiv.classList.add('collapsed');
            icon.textContent = '→';
        }
    }
    function attachQueryToggleEvents() {
        document.querySelectorAll('.query-header').forEach(header => {
            header.removeEventListener('click', queryToggleHandler);
            header.addEventListener('click', queryToggleHandler);
        });
    }
    function queryToggleHandler(e) {
        const details = this.closest('.query-item').querySelector('.query-details');
        const icon = this.querySelector('.query-toggle-icon');
        if (details.classList.contains('open')) {
            details.classList.remove('open');
            icon.textContent = '→';
        } else {
            details.classList.add('open');
            icon.textContent = '↓';
        }
    }

    function updateKPIs() {
        const total = currentFilteredData.length;
        const wrong = currentFilteredData.filter(r => r.Correct === 0).length;
        const accuracy = total ? ((total - wrong)/total * 100).toFixed(1) : 0;
        const uniqueTopics = [...new Set(currentFilteredData.map(r => r.Topic))].length;
        document.getElementById('kpiContainer').innerHTML = `
            <div class="kpi-card"><div class="kpi-number">${total}</div><div class="kpi-label">Attempts</div></div>
            <div class="kpi-card"><div class="kpi-number">${wrong}</div><div class="kpi-label">Mistakes</div></div>
            <div class="kpi-card"><div class="kpi-number">${accuracy}%</div><div class="kpi-label">Accuracy</div></div>
            <div class="kpi-card"><div class="kpi-number">${uniqueTopics}</div><div class="kpi-label">Topics</div></div>
        `;
    }

    function populateFilters() {
        const topics = [...new Set(practiceRecords.map(r => r.Topic))];
        const topicSelect = document.getElementById('topicFilter');
        topicSelect.innerHTML = '<option value="all">All Topics</option>' + topics.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
    }

    function renderDataTable() {
        const thead = document.getElementById('tableHeader');
        const tbody = document.getElementById('tableBody');
        const headers = ['Date', 'Question', 'Topic', 'Difficulty', 'User Query', 'Correct Query', 'Mistake Type', 'Correct', 'Attempt'];
        thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
        tbody.innerHTML = '';
        practiceRecords.forEach((rec, idx) => {
            const row = tbody.insertRow();
            const userDisplayText = getTableDisplayText(rec.UserQuery, backtickVisibleInTable);
            const correctDisplayText = getTableDisplayText(rec.CorrectQuery, backtickVisibleInTable);
            row.insertCell(0).textContent = rec.Date;
            row.insertCell(1).textContent = rec.Question;
            row.insertCell(2).textContent = rec.Topic;
            row.insertCell(3).textContent = rec.Difficulty;
            row.insertCell(4).textContent = userDisplayText;
            row.insertCell(5).textContent = correctDisplayText;
            row.insertCell(6).textContent = rec.MistakeType;
            row.insertCell(7).textContent = rec.Correct;
            row.insertCell(8).textContent = rec.Attempt;
        });
    }

    function copyTableToClipboard() {
        let tableText = '';
        const rows = document.querySelectorAll('#sourceTable tr');
        rows.forEach(row => {
            const cells = row.querySelectorAll('th, td');
            const rowText = Array.from(cells).map(cell => cell.textContent).join('\t');
            tableText += rowText + '\n';
        });
        navigator.clipboard.writeText(tableText).then(() => alert('Table copied!')).catch(() => alert('Copy failed'));
    }

    function toggleBacktickDisplayMode() {
        backtickVisibleInTable = !backtickVisibleInTable;
        renderDataTable();
        const btn = document.getElementById('toggleBacktickBtn');
        btn.textContent = backtickVisibleInTable ? '🎨 Hide Backticks' : '🎨 Show Backticks';
    }

    function parseTSVToRecords(tsv, append = false) {
        const lines = tsv.trim().split(/\r?\n/);
        if (lines.length < 1) return;
        const newRecords = [];
        for (let i = 0; i < lines.length; i++) {
            const cols = lines[i].split('\t');
            if (cols.length >= 9) {
                newRecords.push({
                    Date: cols[0].trim(),
                    Question: cols[1].trim(),
                    Topic: cols[2].trim(),
                    Difficulty: cols[3].trim(),
                    UserQuery: cols[4].trim(),
                    CorrectQuery: cols[5].trim(),
                    MistakeType: cols[6].trim(),
                    Correct: parseInt(cols[7].trim(), 10),
                    Attempt: parseInt(cols[8].trim(), 10)
                });
            }
        }
        if (newRecords.length) {
            if (append) practiceRecords.push(...newRecords);
            else practiceRecords = newRecords;
            populateFilters();
            renderDataTable();
            applyFiltersAndSort();
        }
    }

    function toggleFilterBarVisibility(activeTabId) {
        const filterBar = document.getElementById('globalFilterBar');
        if (activeTabId === 'dashboard') {
            filterBar.classList.remove('hidden-filter');
        } else {
            filterBar.classList.add('hidden-filter');
        }
    }

    // Event listeners
    document.getElementById('topicFilter').addEventListener('change', applyFiltersAndSort);
    document.getElementById('difficultyFilter').addEventListener('change', applyFiltersAndSort);
    document.getElementById('dateOrder').addEventListener('change', applyFiltersAndSort);
    document.getElementById('resultFilter').addEventListener('change', applyFiltersAndSort);
    document.getElementById('attemptSort').addEventListener('change', applyFiltersAndSort);
    document.getElementById('refreshCardsFromTable').addEventListener('click', () => { renderDataTable(); applyFiltersAndSort(); });
    document.getElementById('copyTableBtn').addEventListener('click', copyTableToClipboard);
    document.getElementById('toggleBacktickBtn').addEventListener('click', toggleBacktickDisplayMode);
    document.getElementById('importPasteBtn').addEventListener('click', () => { const tsv = document.getElementById('pasteData').value; if (tsv) parseTSVToRecords(tsv, false); });
    document.getElementById('appendPasteBtn').addEventListener('click', () => { const tsv = document.getElementById('pasteData').value; if (tsv) parseTSVToRecords(tsv, true); });

    const mainTabs = document.querySelectorAll('.main-tab-btn');
    const panes = {
        dashboard: document.getElementById('dashboardPane'),
        metrics: document.getElementById('metricsPane'),
        paste: document.getElementById('pastePane'),
        table: document.getElementById('tablePane')
    };
    mainTabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-main-tab');
            mainTabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            Object.values(panes).forEach(pane => pane.classList.remove('active'));
            if (tabId === 'dashboard') { panes.dashboard.classList.add('active'); toggleFilterBarVisibility('dashboard'); applyFiltersAndSort(); }
            if (tabId === 'metrics') { 
                panes.metrics.classList.add('active'); 
                toggleFilterBarVisibility('metrics'); 
                updateKPIs(); 
                setTimeout(() => renderAllCharts(), 30);
            }
            if (tabId === 'paste') { panes.paste.classList.add('active'); toggleFilterBarVisibility('paste'); }
            if (tabId === 'table') { panes.table.classList.add('active'); toggleFilterBarVisibility('table'); renderDataTable(); }
        });
    });

    // Start the app
    initApp();
</script>
</body>
</html>
